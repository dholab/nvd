  nvd_fastx_overlap_merged_pair_length_distribution:
    fn: "nvd_fastx_overlap_merged_pair_length_distribution_mqc.yaml"
  nvd_fastx_filtered_contigs_length_distribution:
    fn: "nvd_fastx_filtered_contigs_length_distribution_mqc.yaml"
  nvd_fastx_quality_distribution:
    fn: "nvd_fastx_quality_distribution_mqc.yaml"
  nvd_assembly:
    fn: "nvd_assembly_mqc.yaml"
  nvd_prepared_blast_query_batches:
    fn: "nvd_prepared_blast_query_batches_mqc.yaml"
  nvd_blast_task_breakdown:
