name: Container Build and Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'Containerfile'
      - 'pyproject.toml'
      - 'pixi.lock'
      - 'uv.lock'
      - 'lib/**'
      - 'conf/**'
      - '.github/workflows/container-build-test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Containerfile'
      - 'pyproject.toml'
      - 'pixi.lock'
      - 'uv.lock'
      - 'lib/**'
      - 'conf/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-docker:
    name: Test Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: false
          load: true
          tags: nvd:test
          cache-from: |
            type=gha,scope=${{ github.ref_name }}
            type=gha,scope=main
            type=gha,scope=develop
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}
      
      - name: Verify image built
        run: |
          docker images nvd:test
          echo "Built image: nvd:test"
      
      - name: Test container starts
        run: |
          docker run --rm nvd:test \
            bash -c 'echo "Container started successfully"'
      
      - name: Test Pixi runtime precedence
        run: |
          docker run --rm --env TERM=dumb nvd:test \
            bash -euo pipefail -c '
              [ "${PATH%%:*}" = "/opt/.pixi/envs/default/bin" ]
              [ "$(command -v perl)" = "/opt/.pixi/envs/default/bin/perl" ]
              perl -MFindBin -e 1
              [ "$(command -v nextflow)" = "/opt/.pixi/envs/default/bin/nextflow" ]
              nextflow -version
              fastqc --version
            '

      - name: Test FastQC on a minimal FASTQ
        run: |
          docker run --rm --env TERM=dumb nvd:test \
            bash -euo pipefail -c '
              tmp_dir=/tmp/fastqc-smoke
              mkdir "$tmp_dir"
              printf "@smoke\nACGTACGT\n+\nIIIIIIII\n" > "$tmp_dir/smoke.fastq"
              fastqc --quiet --outdir "$tmp_dir" "$tmp_dir/smoke.fastq"
              test -s "$tmp_dir/smoke_fastqc.zip"
              test -s "$tmp_dir/smoke_fastqc.html"
              unzip -t "$tmp_dir/smoke_fastqc.zip"
              grep -q "<html" "$tmp_dir/smoke_fastqc.html"
            '

      - name: Test HTTPS with Pixi curl
        run: |
          docker run --rm --env TERM=dumb nvd:test \
            bash -euo pipefail -c '
              [ "$(command -v curl)" = "/opt/.pixi/envs/default/bin/curl" ]
              curl --fail --silent --show-error --location \
                --proto "=https" \
                --output /tmp/nvd-checksums.txt \
                "https://dholk.primate.wisc.edu/_webdav/dho/projects/lungfish/InfinitePath/public/%40files/release-v3.0.0/v3.0.0/checksums_v3_0.txt"
              test -s /tmp/nvd-checksums.txt
            '
      
      - name: Test bioinformatics tools available
        run: |
          docker run --rm --env TERM=dumb nvd:test \
            bash -euo pipefail -c '
              for command_name in \
                bbmap.sh blastn deacon fastp flye metaMDBG minimap2 mmseqs \
                myloasm samtools seqkit spades.py sracha sourmash taxburst \
                vsearch alignoth fastqc multiqc; do
                [ "$(command -v "$command_name")" = "/opt/.pixi/envs/default/bin/$command_name" ]
              done

              bbmap.sh --version
              blastn -version
              deacon --version
              fastp --version
              flye --version
              metaMDBG --version
              minimap2 --version
              mmseqs version
              myloasm --version
              samtools --version
              seqkit version
              spades.py --version
              sracha --version
              sourmash --version
              taxburst --help
              vsearch --version
              alignoth --version
              fastqc --version
              multiqc --version
            '

      - name: Test Pixi-managed system tools available
        run: |
          docker run --rm --env TERM=dumb nvd:test \
            bash -euo pipefail -c '
              for command_name in openssl sqlite3 unzip zstd; do
                [ "$(command -v "$command_name")" = "/opt/.pixi/envs/default/bin/$command_name" ]
              done

              openssl version
              sqlite3 --version
              unzip -v
              zstd --version
            '
      
      - name: Test Python environment
        run: |
          docker run --rm nvd:test \
            bash -c '
              python --version &&
              python -c "import Bio; print(\"Bio OK\")" &&
              python -c "import pandas; print(\"pandas OK\")" &&
              python -c "import polars; print(\"polars OK\")"
            '
      
      - name: Test py_nvd package imports
        run: |
          docker run --rm nvd:test \
            bash -c '
              echo "Testing py_nvd imports..." &&
              python -c "from py_nvd import __version__; print(f\"py_nvd version: {__version__}\")" &&
              python -c "from py_nvd.cli import app; print(\"CLI app imported successfully\")" &&
              echo "✅ All py_nvd imports successful"
            '
      
      - name: Test nvd CLI
        run: |
          docker run --rm nvd:test \
            bash -c '
              echo "Testing nvd CLI..." &&
              nvd --help &&
              nvd version &&
              echo "✅ nvd CLI works"
            '
      
      - name: Test environment variables
        run: |
          docker run --rm nvd:test \
            bash -c '
              [ "$NXF_CACHE_DIR" = "/scratch" ] || exit 1
              [ "$NXF_HOME" = "/scratch" ] || exit 1
              echo "Environment variables OK"
            '
